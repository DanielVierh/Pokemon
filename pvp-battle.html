<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="public/css/main.css" />
    <title>PvP Kampf</title>
    <style>
      .team-dot {
        font-size: 1.3rem;
        margin: 0 3px;
        color: #3db43d;
      }
      .team-dot.defeated {
        color: #555;
      }
      .team-dot.active {
        color: #f5c518;
      }
      .pvpTeamDots {
        text-align: center;
        padding: 2px 0;
        font-size: 0;
      }
      #pvpTeamSelector {
        display: none;
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #1a1a2e;
        border-top: 2px solid #f5c518;
        padding: 16px;
        z-index: 500;
        text-align: center;
      }
      #pvpTeamSelector p {
        color: #f5c518;
        margin: 0 0 10px;
        font-size: 0.95rem;
      }
      #pvpTeamSelector .actionButton2 {
        margin: 4px;
        min-width: 140px;
      }
      #pvpWaitOverlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.65);
        z-index: 999;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 12px;
        color: #f5c518;
        font-family: sans-serif;
        font-size: 1.1rem;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div class="mainContainer" id="battleTag">
      <!-- Menü -->
      <div class="menueButton" id="btn_Menue">Menü</div>
      <div class="menueWindow" id="windowMenu">
        <div class="closebutton" id="btnCloseMenue">X</div>
        <div class="menuCont">
          <a href="catchedPokemons.html" class="munulink">Meine Pokemons</a>
          <a href="pokedex.html" class="munulink">Pokedex</a>
          <a href="map1.html" class="munulink">Fliehen</a>
        </div>
      </div>

      <!-- Gegner-Pokemon-Karte -->
      <div class="pokeBattleCard" id="wildPkeBattleCard">
        <p
          id="pvpOpponentName"
          style="font-size: 0.75rem; color: #f5c518; margin: 0"
        ></p>
        <p id="wildPokeName"></p>
        <div class="pvpTeamDots" id="oppTeamDots"></div>
        <meter
          min="0"
          max="100"
          low="30"
          high="60"
          optimum="100"
          id="wildPokemonProgress"
        ></meter>
      </div>
      <img src="" alt="Pokemon" id="imgPoke" class="wildPokemonImage" />

      <!-- Infobox -->
      <div class="infBox" id="infoBox" hidden></div>

      <!-- Eigenes Pokemon -->
      <div class="myPokeBattleCard" id="myPkeBattleCard">
        <div class="pvpTeamDots" id="pvpTeamDots"></div>
        <p id="myPokeName"></p>
      </div>
      <meter
        min="0"
        max="100"
        low="30"
        high="60"
        optimum="100"
        id="myPokemonProgress"
      ></meter>
      <img src="" alt="Pokemon" id="imgMyPoke" class="myPokemonImage" />

      <!-- Attacken-Buttons (mein Zug) -->
      <div id="moveButtonCont" hidden>
        <div class="buttonContainer2">
          <button class="actionButton2" id="btnAttack0">-</button>
          <button class="actionButton2" id="btnAttack1">-</button>
          <button class="actionButton2" id="btnAttack2">-</button>
          <button class="actionButton2" id="btnAttack3">-</button>
        </div>
      </div>

      <!-- Pokemon-Wechsel nach K.O. -->
      <div id="pvpTeamSelector">
        <p>Wähle dein nächstes Pokemon:</p>
      </div>

      <!-- Warte-Overlay -->
      <div id="pvpWaitOverlay">
        <div id="pvpWaitText">Warte…</div>
      </div>

      <script src="/socket.io/socket.io.js"></script>
      <script src="public/javascript/pvp-battle.js"></script>
    </div>
  </body>
</html>
